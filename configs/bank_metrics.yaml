metrics:
  # ── 账户类指标 ────────────────────────────────────────
  total_balance:
    expr: SUM(acct_bal)
    description: "账户总余额（含冻结）"
  available_balance:
    expr: SUM(avl_bal)
    description: "账户可用余额"
  frozen_amount:
    expr: SUM(frz_amt)
    description: "冻结金额合计"
  account_count:
    expr: COUNT(DISTINCT acct_no)
    description: "账户数量"
  avg_balance:
    expr: AVG(acct_bal)
    description: "账户平均余额"
  max_balance:
    expr: MAX(acct_bal)
    description: "最大账户余额"

  # ── 客户类指标 ────────────────────────────────────────
  customer_count:
    expr: COUNT(DISTINCT cif_no)
    description: "客户数量（去重）"
  vip_customer_count:
    expr: "COUNT(DISTINCT CASE WHEN cust_sts_cd = '01' THEN cif_no END)"
    description: "正常状态客户数"

  # ── 交易类指标 ────────────────────────────────────────
  txn_count:
    expr: COUNT(txn_seq_no)
    description: "交易笔数"
  txn_amount:
    expr: SUM(txn_amt)
    description: "交易金额合计"
  inflow_amount:
    expr: "SUM(CASE WHEN dr_cr_flg = '2' THEN txn_amt ELSE 0 END)"
    description: "资金流入金额（贷方）"
  outflow_amount:
    expr: "SUM(CASE WHEN dr_cr_flg = '1' THEN txn_amt ELSE 0 END)"
    description: "资金流出金额（借方）"
  net_inflow:
    expr: "SUM(CASE WHEN dr_cr_flg = '2' THEN txn_amt ELSE -txn_amt END)"
    description: "净流入金额（流入-流出）"
  avg_txn_amount:
    expr: AVG(txn_amt)
    description: "单笔交易平均金额"
  max_txn_amount:
    expr: MAX(txn_amt)
    description: "单笔最大交易金额"

  # ── 产品类指标 ────────────────────────────────────────
  product_hold_amount:
    expr: SUM(hold_amt)
    description: "产品持有金额合计"
  product_sign_amount:
    expr: SUM(sign_amt)
    description: "产品签约金额合计"
  agreement_count:
    expr: COUNT(agt_no)
    description: "合约数量"
  avg_hold_amount:
    expr: AVG(hold_amt)
    description: "户均持有金额"

  # ── 收益类指标 ────────────────────────────────────────
  expected_yield:
    expr: "SUM(hold_amt * exp_yld_rate)"
    description: "预期收益金额（持有金额×预期收益率）"
  avg_yield_rate:
    expr: AVG(exp_yld_rate)
    description: "平均预期收益率"

dimensions:
  # ── 客户维度 ──────────────────────────────────────────
  customer_name:
    column: cust_nm
    description: "客户姓名"
  customer_status:
    column: cust_sts_cd
    description: "客户状态（01正常/02冻结/03睡眠/09销户）"
  customer_type:
    column: cust_type_cd
    description: "客户类型（01个人/02企业）"
  cert_type:
    column: cert_type_cd
    description: "证件类型（01身份证/02护照/03军官证/04港澳通行证）"
  risk_level:
    column: risk_lvl_cd
    description: "风险等级（01保守/02稳健/03平衡/04进取/05激进）"
  reg_date:
    column: reg_dt
    description: "客户注册日期"
  manager_no:
    column: mgr_emp_no
    description: "客户经理编号"

  # ── 账户维度 ──────────────────────────────────────────
  account_type:
    column: acct_type_cd
    description: "账户类型（01活期/02定期/03理财/04信用卡）"
  currency:
    column: ccyc_cd
    description: "币种（CNY人民币/USD美元/EUR欧元/HKD港币）"
  account_status:
    column: acct_sts_cd
    description: "账户状态（01正常/02冻结/03止付/09销户）"
  open_date:
    column: open_dt
    description: "开户日期"
  maturity_date:
    column: mat_dt
    description: "到期日期"

  # ── 交易维度 ──────────────────────────────────────────
  txn_date:
    column: txn_dt
    description: "交易日期"
  txn_type:
    column: txn_type_cd
    description: "交易类型代码"
  txn_type_name:
    column: txn_type_nm
    description: "交易类型名称"
  dr_cr_flag:
    column: dr_cr_flg
    description: "借贷标志（1借/出，2贷/入）"
  channel:
    column: chl_cd
    description: "渠道代码"
  channel_name:
    column: chl_nm
    description: "渠道名称"
  reversal_flag:
    column: rvsl_flg
    description: "冲正标志（0正常，1已冲正）"

  # ── 产品维度 ──────────────────────────────────────────
  product_name:
    column: prod_nm
    description: "产品名称"
  product_level1:
    column: prod_lvl1_nm
    description: "产品一级类目"
  product_level2:
    column: prod_lvl2_nm
    description: "产品二级类目"
  product_status:
    column: prod_sts_cd
    description: "产品状态（01在售/02停售/03售罄）"
  min_purchase:
    column: min_pur_amt
    description: "最低购买金额"

  # ── 机构维度 ──────────────────────────────────────────
  org_code:
    column: org_cd
    description: "机构代码"
  org_name:
    column: org_nm
    description: "机构名称"
  org_level:
    column: org_lvl
    description: "机构层级（1总行/2分行/3支行）"

  # ── 合约维度 ──────────────────────────────────────────
  agreement_status:
    column: agt_sts_cd
    description: "合约状态（01有效/02到期/03提前终止）"
  sign_date:
    column: sign_dt
    description: "签约日期"
  due_date:
    column: due_dt
    description: "到期日期"

data_sources:
  # ── 主数据源：客户账户 ────────────────────────────────
  customer_accounts:
    table: t_acct_main
    metrics: [total_balance, available_balance, frozen_amount, account_count, avg_balance, max_balance]
    dimensions: [account_type, currency, account_status, open_date, maturity_date, org_name]
    joins:
      t_cif_base:
        on: cif_no
        type: left
        alias: c
      t_org_hier:
        on: mgr_emp_no
        type: left
        alias: o

  # ── 主数据源：交易流水 ────────────────────────────────
  transactions:
    table: t_txn_dtl
    metrics: [txn_count, txn_amount, inflow_amount, outflow_amount, net_inflow, avg_txn_amount, max_txn_amount]
    dimensions: [txn_date, txn_type, txn_type_name, dr_cr_flag, channel, channel_name, reversal_flag]
    joins:
      t_acct_main:
        on: acct_no
        type: left
        alias: a
      t_cif_base:
        on: cif_no
        type: left
        alias: c
      t_chl_mapping:
        on: chl_cd
        type: left
        alias: ch
      t_txn_type_dict:
        on: txn_type_cd
        type: left
        alias: tt

  # ── 主数据源：客户产品合约 ────────────────────────────
  agreements:
    table: t_cust_prod_agt
    metrics: [product_hold_amount, product_sign_amount, agreement_count, avg_hold_amount, expected_yield, avg_yield_rate]
    dimensions: [agreement_status, sign_date, due_date, product_name, product_level1, product_level2, product_status]
    joins:
      t_cif_base:
        on: cif_no
        type: left
        alias: c
      t_prod_info:
        on: prod_cd
        type: left
        alias: p
      t_acct_main:
        on: acct_no
        type: left
        alias: a

  # ── 主数据源：客户主表 ────────────────────────────────
  customers:
    table: t_cif_base
    metrics: [customer_count, vip_customer_count]
    dimensions: [customer_name, customer_status, customer_type, cert_type, risk_level, reg_date, manager_no, org_name]
    joins:
      t_org_hier:
        on: org_cd
        type: left
        alias: o
