metrics:
  sales_amount:
    expr: SUM(order_amount)
    description: "销售额"
  gmv:
    expr: SUM(order_amount)
    description: "成交总额"
  order_count:
    expr: COUNT(id)
    description: "订单数量"
  avg_order_value:
    expr: AVG(order_amount)
    description: "客单价"
  total_discount:
    expr: SUM(discount_amount)
    description: "优惠总额"
  customer_count:
    expr: COUNT(DISTINCT customer_id)
    description: "客户数量"
  max_price:
    expr: MAX(price)
    description: "最高单价"
  avg_price:
    expr: AVG(price)
    description: "平均单价"

dimensions:
  product_name:
    column: product_name
    type: string
    description: "产品名称"
  region:
    column: region
    type: string
    description: "地区"
    value_map:
      华东: HD
      华南: HN
      华北: HB
      华西: HX
  order_date:
    column: order_date
    type: date
    description: "订单日期"
  brand:
    column: brand
    type: string
    description: "品牌"
  category:
    column: category
    type: string
    description: "品类"
    value_map:
      手机: phone
      电脑: computer
      服饰: apparel
      食品: food
  channel:
    column: channel
    type: string
    description: "销售渠道"
    value_map:
      线上: online
      线下: offline
  customer_type:
    column: customer_type
    type: string
    description: "客户类型"
    value_map:
      VIP: vip
      新客: new
      老客: old
  customer_name:
    column: customer_name
    type: string
    description: "客户名称"
  city_level:
    column: city_level
    type: string
    description: "城市等级"
  supplier_name:
    column: supplier_name
    type: string
    description: "供应商名称"
  price:
    column: price
    type: float
    description: "产品单价"

data_sources:
  orders:
    table: order_fact
    metrics: [sales_amount, gmv, order_count, avg_order_value, total_discount]
    dimensions: [product_name, region, order_date, brand, category, channel, customer_type]
    joins:
      product_dim:
        on: product_id
        type: inner
        alias: p
      customer_dim:
        on: customer_id
        type: left
        alias: c
      supplier_dim:
        on: p.supplier_id
        type: left
        alias: s
  products:
    table: product_dim
    metrics: [max_price, avg_price]
    dimensions: [product_name, brand, category, price]
  customers:
    table: customer_dim
    metrics: [customer_count]
    dimensions: [customer_name, customer_type, region, city_level]
  suppliers:
    table: supplier_dim
    metrics: []
    dimensions: [supplier_name]
