version: "1.0"
domain: ecommerce
description: "Ecommerce queries with various filter operators"

test_cases:
  - id: ec_filter_001
    query: "华东地区的销售额"
    description: "Equal filter with semantic value"
    tags: ["filter", "equal", "region", "semantic_resolution"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: region
          operator: "="
          value: 华东
      order_by: []
      limit: 10

  - id: ec_filter_002
    query: "非手机品类的销售额"
    description: "Not-equal filter"
    tags: ["filter", "not_equal", "category"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: category
          operator: "!="
          value: 手机
      order_by: []
      limit: 10

  - id: ec_filter_003
    query: "订单金额大于5000的销售额"
    description: "Greater-than filter on numeric field"
    tags: ["filter", "greater_than", "numeric"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: pay_amount
          operator: ">"
          value: 5000
      order_by: []
      limit: 10

  - id: ec_filter_004
    query: "查询iPhone相关产品的销售额"
    description: "Like filter for fuzzy matching"
    tags: ["filter", "like", "product_name"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: product_name
          operator: like
          value: iPhone
      order_by: []
      limit: 10

  - id: ec_filter_005
    query: "华东和华南地区的销售额"
    description: "In-list filter for multiple regions"
    tags: ["filter", "in", "multi_region"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: region
          operator: in
          value: [华东, 华南]
      order_by: []
      limit: 10

  - id: ec_filter_006
    query: "华东地区线上渠道的销售额"
    description: "Multiple filters combined"
    tags: ["filter", "multi_filter", "region", "channel"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: region
          operator: "="
          value: 华东
        - field: channel
          operator: "="
          value: 线上
      order_by: []
      limit: 10

  - id: ec_filter_007
    query: "高价值客户的销售额"
    description: "Complex semantic filter (VIP + high amount)"
    tags: ["filter", "semantic", "complex", "customer_type"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: customer_type
          operator: "="
          value: VIP
      order_by: []
      limit: 10

  - id: ec_filter_008
    query: "新客和老客的销售额对比"
    description: "Multiple customer type filter with grouping"
    tags: ["filter", "in", "customer_type", "comparison"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions:
        - customer_type
      filters:
        - field: customer_type
          operator: in
          value: [新客, 老客]
      order_by: []
      limit: 10

  - id: ec_filter_009
    query: "价格在5000到20000之间的商品销售额"
    description: "Between / range filter on numeric field"
    tags: ["filter", "between", "range", "numeric"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: price
          operator: between
          value: [5000, 20000]
      order_by: []
      limit: 10

  - id: ec_filter_010
    query: "价格大于等于8000的商品销售额"
    description: "Greater-or-equal filter on numeric field"
    tags: ["filter", "greater_equal", "numeric"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: price
          operator: ">="
          value: 8000
      order_by: []
      limit: 10

  - id: ec_filter_011
    query: "华东地区线上渠道价格大于5000的销售额"
    description: "Multi-condition AND combination with numeric comparison"
    tags: ["filter", "multi_condition", "and", "numeric"]
    expected_dsl:
      data_source: orders
      metrics:
        - func: sum
          field: pay_amount
          alias: sales_amount
      dimensions: []
      filters:
        - field: region
          operator: "="
          value: 华东
        - field: channel
          operator: "="
          value: 线上
        - field: price
          operator: ">"
          value: 5000
      order_by: []
      limit: 10
