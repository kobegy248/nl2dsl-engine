test_cases:
  # Relative / absolute time expression resolution (Week 3).
  # All absolute dates assume reference_date = 2026-06-18.
  # `limit: 100` mirrors the optimizer/normalizer default so the planner scorer
  # (which reads planner.limit) compares cleanly.
  - id: TIME_001
    query: "本月销售额"
    difficulty: easy
    category: time
    tags: ["time", "relative", "month"]
    expected:
      intent: aggregate
      metric: sales_amount
      planner:
        time_field: order_date
        time_range: ["2026-06-01", "2026-06-30"]
        limit: 100

  - id: TIME_002
    query: "上月订单量"
    difficulty: easy
    category: time
    tags: ["time", "relative", "month"]
    expected:
      intent: aggregate
      metric: order_count
      planner:
        time_field: order_date
        time_range: ["2026-05-01", "2026-05-31"]
        limit: 100

  - id: TIME_003
    query: "最近7天销售额"
    difficulty: easy
    category: time
    tags: ["time", "relative", "recent_days"]
    expected:
      intent: aggregate
      metric: sales_amount
      planner:
        time_field: order_date
        time_range: ["2026-06-12", "2026-06-18"]
        limit: 100

  - id: TIME_004
    query: "1月份销售额"
    difficulty: easy
    category: time
    tags: ["time", "standalone_month"]
    expected:
      intent: aggregate
      metric: sales_amount
      planner:
        time_field: order_date
        time_range: ["2026-01-01", "2026-01-31"]
        limit: 100

  - id: TIME_005
    query: "2024年销售额"
    difficulty: easy
    category: time
    tags: ["time", "absolute_year"]
    expected:
      intent: aggregate
      metric: sales_amount
      planner:
        time_field: order_date
        time_range: ["2024-01-01", "2024-12-31"]
        limit: 100
